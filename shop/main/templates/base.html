<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Default title{% endblock title %}</title>
    <!--    <link rel="stylesheet" href="{% static 'css/cart.css' %}">-->
    <link rel="stylesheet" href="{% static 'css/index.css' %}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="body">
<div class="container">
    <header class="header">
        <a href="/" class="logo">VSYODO</a>
        <!--        <div class="search-box">-->
        <!--            <input type="text" placeholder="Найти на VSYODO">-->
        <!--        </div>-->
        <nav class="navigation">
            <div class="header-icons">
                <a href="/profile" class="icon profile">
                    <img src="{% static 'img/icon profile.png' %}" alt="icon profile">
                </a>
                <a href="/cart" class="icon cart">
                    <img src="{% static 'img/icon cart.png' %}" alt="icon cart">
                    <span class="cart-count">0</span>
                </a>
            </div>
        </nav>
    </header>
</div>
<div class="container">{% block content%}{% endblock content %}</div>

</body>
</html>
