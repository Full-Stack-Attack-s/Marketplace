{% extends "base.html" %}
{% block title %}Добавление товара{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-container glass-panel" style="max-width: 600px;">
        <div class="auth-header">
            <h1>Новый товар</h1>
            <p>Заполните характеристики</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="auth-form" id="product-form">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}

            <div id="dynamic-attributes" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                </div>

            <button type="submit" class="auth-button btn-glow" style="margin-top: 20px;">Опубликовать</button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const categorySelect = document.querySelector('#id_category');
    const attrContainer = document.querySelector('#dynamic-attributes');

    console.log("Скрипт запущен. Поле категории найдено:", !!categorySelect);

    if (categorySelect) {
        categorySelect.addEventListener('change', function() {
            const categoryId = this.value;
            console.log("Категория изменена на ID:", categoryId);

            if (!categoryId) {
                attrContainer.innerHTML = '';
                return;
            }

            // Проверяем, по какому URL идет запрос
            const url = `/get-attributes/${categoryId}/`;
            console.log("Отправляю запрос на:", url);

            fetch(url)
                .then(response => {
                    console.log("Статус ответа сервера:", response.status);
                    if (!response.ok) throw new Error('Ошибка сервера: ' + response.status);
                    return response.json();
                })
                .then(data => {
                    console.log("Полученные данные от сервера:", data);
                    
                    if (data.length === 0) {
                        attrContainer.innerHTML = '<p style="color: #888; font-size: 13px;">Для этой категории в админке не заданы характеристики.</p>';
                        return;
                    }

                    attrContainer.innerHTML = '<h3 style="color: var(--nav-active); margin-bottom: 15px;">Характеристики</h3>';
                    data.forEach(attr => {
                        // Определяем тип поля ввода (число или текст) из attr.type
                        const inputType = attr.type === 'number' ? 'number' : 'text';
                        
                        // ИСПОЛЬЗУЕМ attr.label ВМЕСТО attr.name
                        attrContainer.insertAdjacentHTML('beforeend', `
                            <div class="form-group" style="margin-bottom: 15px;">
                                <label style="display:block; margin-bottom: 5px;">${attr.label}</label>
                                <input type="${inputType}" 
                                       name="attr_${attr.id}" 
                                       class="auth-input" 
                                       placeholder="Введите ${attr.label.toLowerCase()}">
                            </div>
                        `);
                    });
                })
                .catch(error => {
                    console.error("Критическая ошибка fetch:", error);
                    attrContainer.innerHTML = '<p style="color: #ff4757;">Ошибка загрузки характеристик. Проверь консоль (F12).</p>';
                });
        });
    }

    
});
</script>
{% endblock %}
