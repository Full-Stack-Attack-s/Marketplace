{% load static %}
<div class="sidebar-card">
    <div class="sidebar-brand">
        <div class="sidebar-avatar">
            {% if store_profile.logo %}
                <img src="{{ store_profile.logo.url }}" alt="Logo" style="width: 100%; height: 100%; border-radius: 12px; object-fit: cover;">
            {% else %}
                {{ request.user.email|slice:":1"|upper }}
            {% endif %}
        </div>
        <div class="sidebar-info">
            <div class="sidebar-store-name">{{ store_profile.company_name|default:"Мой магазин" }}</div>
            <div class="sidebar-store-email">{{ request.user.email }}</div>
        </div>
    </div>

    <nav class="dashboard-menu">
        <a href="{% url 'seller_dashboard' %}" class="{% if request.resolver_match.url_name == 'seller_dashboard' %}active-nav{% endif %}">
            <span>📊</span> Дашборд
        </a>
        <a href="{% url 'manage_products' %}" class="{% if request.resolver_match.url_name == 'manage_products' or request.resolver_match.url_name == 'edit_product' %}active-nav{% endif %}">
            <span>📦</span> Мои товары
        </a>
        <a href="{% url 'seller_profile' %}" class="{% if request.resolver_match.url_name == 'seller_profile' %}active-nav{% endif %}">
            <span>👤</span> Профиль
        </a>
        <a href="{% url 'add_product' %}" class="action-btn btn-edit mt-6 {% if request.resolver_match.url_name == 'add_product' %}active-nav{% endif %}" style="justify-content: center; margin-top: 15px;">
            <span>＋</span> Добавить товар
        </a>
        <div class="menu-divider"></div>
        <a href="/" class="back-link">← Вернуться на сайт</a>
    </nav>
</div>
