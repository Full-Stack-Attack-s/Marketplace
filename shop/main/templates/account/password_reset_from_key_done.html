{% extends "base.html" %}
{% load static %}

{% block title %}Пароль изменен - OMNI{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-container glass-panel">
        <div class="auth-header">
            <h1>Успешно!</h1>
            <p>Ваш пароль был успешно изменен. Теперь вы можете войти, используя новые данные.</p>
        </div>
        
        <div class="auth-footer">
            <a href="{% url 'account_login' %}" class="auth-button btn-glow" style="text-decoration:none; display:block; text-align:center;">Войти</a>
        </div>
    </div>
</div>
{% endblock %}
