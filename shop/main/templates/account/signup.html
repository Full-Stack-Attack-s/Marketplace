{% extends "base.html" %}
{% load socialaccount %} 
{% block content %}
<div class="singup-container">
    <h2>Регистрация</h2>

    <form method="POST" action="{% url 'account_signup' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Создать аккаунт</button>
    </form>
    <hr>
    
    <a href="{% provider_login_url 'google' %}">Зарегистрироваться через Google</a>

    <p>Уже есть аккаунт? <a href="{% url 'account_login' %}">Войти</a></p>
</div>
{% endblock %}
